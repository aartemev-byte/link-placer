<script>
const VER='v3_'+location.hostname;
let D={li:false,cu:null,sites:[],logs:[],users:[{id:'admin',name:'Admin',role:'admin',pass:'admin'}],tab:'sites',modal:null,ckid:null};

function sv(){try{localStorage.setItem(VER,JSON.stringify({sites:D.sites,logs:D.logs,users:D.users}))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem(VER));if(d){D.sites=(d.sites||[]).map(s=>({...s,connected:false,connectionMethod:null}));D.logs=d.logs||[];if(d.users&&d.users.length)D.users=d.users;}}catch(e){}}

function gs(id){return D.sites.find(s=>s.id===id)}
function gensec(){let r='';for(let i=0;i<32;i++)r+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];return r}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fmt(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('ru')}catch{return iso}}
function notify(m,t='info'){const e=document.getElementById('nt');e.className='nt n'+t[0]+' show';e.textContent=m;setTimeout(()=>e.classList.remove('show'),3500)}
function log(a,d){D.logs.push({t:new Date().toISOString(),a,d,u:D.cu?.id||'—'});sv()}
function dl(c,f){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=f;a.click()}
function cp(t){navigator.clipboard.writeText(t).then(()=>notify('Скопировано!')).catch(()=>notify('Ошибка','error'))}

// ===== VERIFICATION: uses secret + unique token =====
// Panel sends: POST with header X-LP-Secret + body {token: <random>}
// Server must return: {verified: "<same token>"}
// This guarantees: correct secret + correct version of connector

async function doCheck(sid){
  const site=gs(sid);if(!site)return;
  D.ckid=sid;render();
  let connected=false,method=null;
  const token='tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);

  // Try REST API
  try{
    const c=new AbortController();const t=setTimeout(()=>c.abort(),10000);
    const r=await fetch(site.url.replace(/\/+$/,'')+'/wp-json/lp-api/v2/verify',{
      method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},
      body:JSON.stringify({token}),signal:c.signal,mode:'cors'});
    clearTimeout(t);
    if(r.status===200){
      const txt=await r.text();
      try{const j=JSON.parse(txt);if(j.verified===token){connected=true;method=j.method||'plugin';}}catch(e){}
    }
  }catch(e){console.log('v1',e.message)}

  // Try file
  if(!connected){
    try{
      const c=new AbortController();const t=setTimeout(()=>c.abort(),10000);
      const r=await fetch(site.url.replace(/\/+$/,'')+'/lp-connector.php?action=verify',{
        method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},
        body:JSON.stringify({token}),signal:c.signal,mode:'cors'});
      clearTimeout(t);
      if(r.status===200){
        const txt=await r.text();
        try{const j=JSON.parse(txt);if(j.verified===token){connected=true;method='file';}}catch(e){}
      }
    }catch(e){console.log('v2',e.message)}
  }

  for(let i=0;i<D.sites.length;i++){
    if(D.sites[i].id===sid){
      D.sites[i]={...D.sites[i],connected,connectionMethod:connected?method:null,lastCheck:new Date().toISOString()};
    }
  }
  log(connected?'Связь ✓':'Связь ✗',site.url+(method?' ('+method+')':''));
  D.ckid=null;D.modal=null;sv();
  notify(connected?'✅ Связь установлена ('+method+')':'❌ Нет связи',connected?'success':'error');
  render();
}

async function doPlace(sid){
  const site=gs(sid);if(!site||!site.connected)return notify('Нет связи','error');
  const html=document.getElementById('ph')?.value?.trim();
  const pl=document.querySelector('.pb.on')?.dataset?.pl||'homepage';
  if(!html)return notify('Вставьте HTML','error');
  const isF=site.connectionMethod==='file';
  const url=isF?site.url.replace(/\/+$/,'')+'/lp-connector.php?action=place':site.url.replace(/\/+$/,'')+'/wp-json/lp-api/v2/place';
  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({html,placement:pl})});
    const j=await r.json();
    if(j.status==='placed'){
      const tmp=document.createElement('div');tmp.innerHTML=html;
      const pv=(tmp.textContent||html).substring(0,80);
      for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=[...D.sites[i].links,{html,placement:pl,id:j.id,pv,at:new Date().toISOString()}]}}
      log('Ссылка ✓',pv+' → '+site.url);D.modal=null;sv();notify('✅ Размещено!','success');
    }else notify('Ошибка: '+(j.error||j.message||JSON.stringify(j)),'error');
  }catch(e){notify('Ошибка: '+e.message,'error')}
  render();
}

// ===== WP CODE: new endpoint lp-api/v2/verify =====
function mkPlugin(sec){
return `<?php
/*
Plugin Name: Link Placer v3
Version: 3.0
*/
if(!defined('ABSPATH'))exit;
add_action('rest_api_init',function(){
  add_action('rest_pre_serve_request',function(){
    header('Access-Control-Allow-Origin: *');
    header('Access-Control-Allow-Headers: Content-Type, X-LP-Secret');
    header('Access-Control-Allow-Methods: GET, POST, OPTIONS');
  });
  register_rest_route('lp-api/v2','/verify',['methods'=>['POST','OPTIONS'],'callback'=>function($r){
    $s=$r->get_header('X-LP-Secret');
    if($s!=='${sec}')return new WP_Error('no','',['status'=>403]);
    $p=$r->get_json_params();$tk=$p['token']??'';
    return['verified'=>$tk,'method'=>'plugin','cms'=>'wordpress'];
  },'permission_callback'=>'__return_true']);
  register_rest_route('lp-api/v2','/place',['methods'=>['POST','OPTIONS'],'callback'=>function($r){
    if($r->get_header('X-LP-Secret')!=='${sec}')return new WP_Error('no','',['status'=>403]);
    $p=$r->get_json_params();$html=$p['html']??'';$pl=sanitize_text_field($p['placement']??'homepage');
    if(!$html)return new WP_Error('bad','html required',['status'=>400]);
    $ok=wp_kses_allowed_html('post');$ok['a']['target']=1;$ok['a']['rel']=1;
    $c=wp_kses($html,$ok);$ls=get_option('lp_links',[]);$id='lp_'.uniqid();
    $ls[$id]=['html'=>$c,'pl'=>$pl,'t'=>current_time('mysql')];update_option('lp_links',$ls);
    return['status'=>'placed','id'=>$id];
  },'permission_callback'=>'__return_true']);
  register_rest_route('lp-api/v2','/links',['methods'=>['GET','OPTIONS'],'callback'=>function($r){
    if($r->get_header('X-LP-Secret')!=='${sec}')return new WP_Error('no','',['status'=>403]);
    return get_option('lp_links',[]);
  },'permission_callback'=>'__return_true']);
  register_rest_route('lp-api/v2','/remove',['methods'=>['POST','OPTIONS'],'callback'=>function($r){
    if($r->get_header('X-LP-Secret')!=='${sec}')return new WP_Error('no','',['status'=>403]);
    $id=sanitize_text_field($r->get_json_params()['id']??'');$ls=get_option('lp_links',[]);
    unset($ls[$id]);update_option('lp_links',$ls);return['status'=>'removed'];
  },'permission_callback'=>'__return_true']);
});
add_action('wp_footer',function(){
  $ls=get_option('lp_links',[]);if(empty($ls))return;$h=is_front_page()||is_home();
  foreach($ls as $l){if(($l['pl']??'homepage')==='homepage'&&!$h)continue;echo $l['html']??'';}
});`}

// ===== RENDER =====
function render(){
  const a=document.getElementById('app');
  if(!D.li){a.innerHTML=rLogin();bLogin();return}
  a.innerHTML=`<div class="app">${rSB()}<div class="mn">${rTab()}</div></div>${rModal()}`;
  bind();
}

function rLogin(){
  return`<div class="lw"><div class="lb">
    <div style="text-align:center;font-size:36px">🔗</div>
    <h1 style="color:#f1f5f9;font-size:22px;text-align:center">Link Placer</h1>
    <p style="color:#94a3b8;font-size:13px;text-align:center;margin-top:4px">v3 — с верификацией</p>
    <div style="margin-top:24px">
      <div class="ig"><input class="inp" id="li" placeholder="Логин"></div>
      <div class="ig"><input class="inp" id="lp" type="password" placeholder="Пароль"></div>
      <button class="btn bp blg" style="width:100%" id="lbtn">Войти</button>
      <div style="color:#64748b;font-size:11px;text-align:center;margin-top:12px">admin / admin</div>
    </div></div></div>`}
function bLogin(){
  const b=document.getElementById('lbtn');if(!b)return;
  const go=()=>{const i=document.getElementById('li').value.trim(),p=document.getElementById('lp').value;
    const u=D.users.find(x=>x.id===i&&x.pass===p);
    if(u){D.cu=u;D.li=true;render()}else notify('Неверные данные','error')};
  b.onclick=go;document.getElementById('lp').onkeydown=e=>{if(e.key==='Enter')go()}}

function rSB(){
  const adm=D.cu?.role==='admin';
  const ts=[{id:'sites',i:'🌐',l:'Сайты'},{id:'add',i:'➕',l:'Добавить'},{id:'logs',i:'📋',l:'Логи'}];
  if(adm)ts.push({id:'users',i:'👥',l:'Пользователи'});
  return`<div class="sb"><div class="sb-logo"><h1>🔗 Link Placer</h1><small>v3.0</small></div>
    ${ts.map(t=>`<button class="nb ${D.tab===t.id?'on':''}" data-tab="${t.id}"><span>${t.i}</span><span class="ll">${t.l}</span></button>`).join('')}
    <div class="sb-ft"><div style="font-size:12px;color:#64748b;margin-bottom:8px">👤 ${D.cu?.name}</div>
    <button class="btn bg bsm" style="width:100%" id="out">Выйти</button></div></div>`}

function rTab(){
  if(D.tab==='add')return rAdd();if(D.tab==='logs')return rLogs();if(D.tab==='users')return rUsers();return rSites()}

function rSites(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <h1 style="font-size:22px;font-weight:700">Мои сайты</h1>
    <div style="display:flex;gap:8px;align-items:center"><span style="font-size:13px;color:#64748b">${D.sites.length}</span>
    <button class="btn bp bsm" data-tab="add">+ Добавить</button></div></div>`;
  if(!D.sites.length)return h+`<div style="text-align:center;padding:60px;color:#475569"><div style="font-size:48px;margin-bottom:12px">🌐</div><div style="font-size:16px;margin-bottom:16px">Нет сайтов</div><button class="btn bp" data-tab="add">Добавить</button></div>`;
  D.sites.forEach(s=>{
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div style="flex:1;min-width:200px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span class="dot ${s.connected?'dg':'dr'}"></span>
          <span style="font-size:16px;font-weight:700;color:#f1f5f9">${esc(s.name)}</span>
          <span class="tag tc">${esc(s.cms)}</span>
          ${s.connected&&s.connectionMethod?`<span class="tag tm">${esc(s.connectionMethod)}</span>`:''}
        </div>
        <div style="font-size:13px;color:#64748b">${esc(s.url)}</div>
        <div style="font-size:12px;color:#475569;margin-top:4px">Ссылок: <strong style="color:#94a3b8">${s.links.length}</strong>${s.lastCheck?' · '+fmt(s.lastCheck):''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn bg bsm" data-do="conn" data-id="${s.id}">🔌 Связь</button>
        <button class="btn bg bsm" data-do="chk" data-id="${s.id}" ${D.ckid===s.id?'disabled':''}>${D.ckid===s.id?'⏳':'🔍'} Проверить</button>
        <button class="btn bsm ${s.connected?'bp':'boff'}" data-do="place" data-id="${s.id}">🔗 Разместить</button>
        ${D.cu?.role==='admin'?`<button class="btn bd bsm" data-do="del" data-id="${s.id}">🗑</button>`:''}
      </div></div>
    ${s.links.length?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(100,116,139,.1)">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Ссылки:</div>
      ${s.links.map(l=>`<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px">
        <span>${l.placement==='sitewide'?'🌐':'🏠'}</span>
        <span style="color:#cbd5e1">${esc((l.pv||l.html||'').substring(0,80))}</span>
        <span style="color:#475569;font-size:11px">${fmt(l.at)}</span></div>`).join('')}</div>`:''}</div>`});
  return h}

function rAdd(){
  return`<div style="max-width:500px"><h1 style="margin-bottom:24px">Добавить сайт</h1>
    <div class="ig"><label class="lbl">Название</label><input class="inp" id="an" placeholder="Мой блог"></div>
    <div class="ig"><label class="lbl">URL</label><input class="inp" id="au" placeholder="https://example.com"></div>
    <div class="ig"><label class="lbl">CMS</label><select class="inp" id="ac"><option value="WordPress">WordPress</option><option disabled>Drupal (скоро)</option></select></div>
    <button class="btn bp blg" style="width:100%" id="abtn">Добавить</button></div>`}

function rLogs(){
  let h='<h1 style="margin-bottom:24px">Логи</h1>';
  if(!D.logs.length)return h+'<div style="text-align:center;padding:60px;color:#475569">Пусто</div>';
  return h+[...D.logs].reverse().map(l=>`<div class="lr">
    <span style="color:#475569;min-width:140px">${fmt(l.t)}</span>
    <span style="color:#94a3b8;min-width:50px">${esc(l.u)}</span>
    <span style="color:#e2e8f0;font-weight:500;min-width:120px">${esc(l.a)}</span>
    <span style="color:#64748b;word-break:break-all">${esc(l.d||'')}</span></div>`).join('')}

function rUsers(){
  if(D.cu?.role!=='admin')return'<p>Нет доступа</p>';
  let h='<h1 style="margin-bottom:24px">Пользователи</h1>';
  D.users.forEach((u,i)=>{h+=`<div class="ur"><div><strong style="color:#f1f5f9">${esc(u.name)}</strong> <span class="tag ${u.role==='admin'?'ta':'tu'}">${u.role}</span></div>
    <div style="display:flex;gap:8px;align-items:center"><span style="color:#64748b;font-size:12px">${esc(u.id)}</span>
    ${u.id!=='admin'?`<button class="btn bd bsm" data-do="delu" data-idx="${i}">🗑</button>`:''}</div></div>`});
  h+=`<div class="card" style="margin-top:20px"><h3 style="font-size:15px;color:#f1f5f9;margin-bottom:12px">Добавить</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <input class="inp" id="ui" placeholder="ID" style="flex:1;min-width:80px;padding:8px 10px;font-size:13px">
    <input class="inp" id="un" placeholder="Имя" style="flex:1;min-width:80px;padding:8px 10px;font-size:13px">
    <input class="inp" id="up" placeholder="Пароль" style="flex:1;min-width:80px;padding:8px 10px;font-size:13px">
    <select class="inp" id="ur" style="width:auto;padding:8px;font-size:13px"><option value="user">User</option><option value="admin">Admin</option></select>
    <button class="btn bp bsm" id="ubtn">+</button></div></div>`;
  return h}

function rModal(){
  if(!D.modal)return'';
  const site=gs(D.modal.sid);if(!site)return'';

  if(D.modal.t==='conn'){
    const v=D.modal.v;let inner='';
    if(!v){
      inner=`<p style="color:#94a3b8;font-size:13px;margin-bottom:20px">Выберите способ подключения. Можно несколько.</p>
        <div style="display:flex;flex-direction:column;gap:10px">
        <button class="co" data-cv="plugin"><span style="font-size:28px">🔌</span><div><div style="color:#f1f5f9;font-weight:600">Плагин WP</div><div style="color:#94a3b8;font-size:12px;margin-top:4px">Скачать и загрузить</div></div></button>
        <button class="co" data-cv="file"><span style="font-size:28px">📄</span><div><div style="color:#f1f5f9;font-weight:600">Файл в корень</div><div style="color:#94a3b8;font-size:12px;margin-top:4px">lp-connector.php</div></div></button>
        <button class="co" data-cv="func"><span style="font-size:28px">⚙️</span><div><div style="color:#f1f5f9;font-weight:600">functions.php</div><div style="color:#94a3b8;font-size:12px;margin-top:4px">Вставить код</div></div></button></div>`
    }else if(v==='plugin'){
      inner=`<button class="btn bg bsm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">Плагин WordPress</h3>
        <ol class="st"><li>Удалите старый плагин Link Placer если есть</li><li>Скачайте новый</li><li><code>Плагины → Добавить → Загрузить</code> → Активировать</li><li>Проверьте связь</li></ol>
        <button class="btn bp" style="margin-top:14px" id="dlp">📥 Скачать плагин v3</button>`
    }else if(v==='file'){
      inner=`<button class="btn bg bsm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">Файл в корень</h3>
        <ol class="st"><li>Скачайте файл</li><li>Загрузите в корень сайта</li><li>Проверьте связь</li></ol>
        <button class="btn bp" style="margin-top:14px" id="dlf">📥 Скачать lp-connector.php</button>`
    }else if(v==='func'){
      inner=`<button class="btn bg bsm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">functions.php</h3>
        <ol class="st"><li>Скопируйте код</li><li>Вставьте в конец functions.php</li><li>Проверьте связь</li></ol>
        <div class="cb"><pre>${esc(mkFunc(site.secret))}</pre><button class="cp" id="cpf">Копировать</button></div>`}
    return`<div class="mo" id="ov"><div class="ml mm">
      <div class="mh"><h2>Связь — ${esc(site.name)}</h2><button class="mc" id="cx">✕</button></div>
      ${inner}
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(100,116,139,.2)">
        <button class="btn bs" id="mchk" ${D.ckid?'disabled':''}>${D.ckid?'⏳ Проверяю...':'🔍 Проверить связь'}</button>
      </div>
      <div class="sb-box"><strong>Secret:</strong> <code>${site.secret}</code></div>
    </div></div>`}

  if(D.modal.t==='place'){
    if(!site.connected)return`<div class="mo" id="ov"><div class="ml ms">
      <h3 style="color:#ef4444;margin-bottom:12px">⚠️ Нет связи</h3>
      <p style="color:#94a3b8">Сначала установите связь</p>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn bp bsm" id="gc">Установить</button><button class="btn bg bsm" id="cx">Закрыть</button>
      </div></div></div>`;
    return`<div class="mo" id="ov"><div class="ml mm">
      <div class="mh"><h2>Разместить — ${esc(site.name)}</h2><button class="mc" id="cx">✕</button></div>
      <div class="ig"><label class="lbl">HTML-код</label>
        <textarea class="inp" id="ph" rows="5" placeholder='<a href="https://example.com">Текст</a>' style="font-family:monospace;font-size:13px;resize:vertical;min-height:80px"></textarea></div>
      <div class="ig"><label class="lbl">Размещение</label>
        <div style="display:flex;gap:8px"><button class="pb on" data-pl="homepage">🏠 Главная</button><button class="pb" data-pl="sitewide">🌐 Сквозное</button></div></div>
      <button class="btn bp blg" style="width:100%;margin-top:8px" id="dpl">Разместить</button>
    </div></div>`}
  return''}

// ===== BINDINGS =====
function bind(){
  document.querySelectorAll('[data-tab]').forEach(e=>e.onclick=()=>{D.tab=e.dataset.tab;render()});
  const o=document.getElementById('out');if(o)o.onclick=()=>{D.li=false;D.cu=null;render()};
  const ab=document.getElementById('abtn');
  if(ab)ab.onclick=()=>{
    const n=document.getElementById('an').value.trim();let u=document.getElementById('au').value.trim();
    if(!n||!u)return notify('Заполните','error');
    if(!u.startsWith('http'))u='https://'+u;u=u.replace(/\/+$/,'');
    if(D.sites.some(s=>s.url===u))return notify('Уже есть','error');
    D.sites.push({id:Date.now().toString(),url:u,name:n,cms:document.getElementById('ac').value,secret:gensec(),connected:false,connectionMethod:null,links:[],addedAt:new Date().toISOString(),lastCheck:null});
    log('Добавлен',u);D.tab='sites';notify('Добавлен');render()};

  document.querySelectorAll('[data-do]').forEach(e=>e.onclick=()=>{
    const id=e.dataset.id,idx=parseInt(e.dataset.idx),act=e.dataset.do;
    if(act==='conn'){D.modal={t:'conn',sid:id,v:null};render()}
    if(act==='chk')doCheck(id);
    if(act==='place'){D.modal={t:'place',sid:id};render()}
    if(act==='del'){D.sites=D.sites.filter(s=>s.id!==id);sv();notify('Удалён');render()}
    if(act==='delu'){D.users.splice(idx,1);sv();notify('Удалён');render()}});

  const cx=document.getElementById('cx');if(cx)cx.onclick=()=>{D.modal=null;render()};
  const ov=document.getElementById('ov');if(ov)ov.onclick=e=>{if(e.target===ov){D.modal=null;render()}};

  document.querySelectorAll('[data-cv]').forEach(e=>e.onclick=()=>{if(D.modal)D.modal.v=e.dataset.cv==='back'?null:e.dataset.cv;render()});

  const dlp=document.getElementById('dlp');if(dlp&&D.modal){const s=gs(D.modal.sid);if(s)dlp.onclick=()=>dl(mkPlugin(s.secret),'link-placer-v3.php')}
  const dlf=document.getElementById('dlf');if(dlf&&D.modal){const s=gs(D.modal.sid);if(s)dlf.onclick=()=>dl(mkFile(s.secret),'lp-connector.php')}
  const cpf=document.getElementById('cpf');if(cpf&&D.modal){const s=gs(D.modal.sid);if(s)cpf.onclick=()=>cp(mkFunc(s.secret))}
  const mchk=document.getElementById('mchk');if(mchk&&D.modal)mchk.onclick=()=>doCheck(D.modal.sid);
  const gc=document.getElementById('gc');if(gc&&D.modal)gc.onclick=()=>{D.modal={t:'conn',sid:D.modal.sid,v:null};render()};

  document.querySelectorAll('[data-pl]').forEach(e=>e.onclick=()=>{document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));e.classList.add('on')});
  const dpl=document.getElementById('dpl');if(dpl&&D.modal)dpl.onclick=()=>doPlace(D.modal.sid);

  const ubtn=document.getElementById('ubtn');
  if(ubtn)ubtn.onclick=()=>{
    const i=document.getElementById('ui').value.trim(),n=document.getElementById('un').value.trim(),p=document.getElementById('up').value,r=document.getElementById('ur').value;
    if(!i||!n||!p)return notify('Заполните','error');
    if(D.users.some(u=>u.id===i))return notify('ID занят','error');
    D.users.push({id:i,name:n,pass:p,role:r});sv();notify('Добавлен');render()}}

ld();render();
</script>
