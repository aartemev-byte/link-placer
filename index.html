<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkForge — Smart Link Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f;--bg2:#0c1020;--bg3:#111827;--bg4:#1a2236;
  --accent:#6c5ce7;--accent2:#a78bfa;--accent3:#c4b5fd;
  --cyan:#22d3ee;--green:#34d399;--red:#f87171;--orange:#fb923c;--pink:#f472b6;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --border:rgba(100,116,139,.12);--border2:rgba(100,116,139,.25);
  --glow:rgba(108,92,231,.15);--glow2:rgba(108,92,231,.08);
  --radius:14px;--radius2:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:inherit}
a{color:var(--accent2);text-decoration:none}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* === ANIMATED BG === */
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 50%,rgba(108,92,231,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(34,211,238,.04) 0%,transparent 50%),
  radial-gradient(ellipse at 50% 80%,rgba(244,114,182,.04) 0%,transparent 50%);
  animation:bgMove 20s ease-in-out infinite;z-index:0;pointer-events:none}
@keyframes bgMove{0%,100%{transform:translate(0,0)}50%{transform:translate(-2%,-1%)}}

/* === LAYOUT === */
.app{display:flex;min-height:100vh;position:relative;z-index:1}
.sb{width:260px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;backdrop-filter:blur(20px)}
.mn{flex:1;margin-left:260px;padding:32px 40px;min-height:100vh}

/* === SIDEBAR === */
.sb-logo{padding:28px 24px 24px;margin-bottom:4px}
.sb-logo .brand{display:flex;align-items:center;gap:12px}
.sb-logo .brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(108,92,231,.4)}
.sb-logo h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.sb-logo small{font-size:10px;color:var(--text3);margin-top:2px;display:block;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.sb-sep{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:4px 20px 8px}
.nb{display:flex;align-items:center;gap:12px;padding:12px 24px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:14px;width:100%;text-align:left;border-left:3px solid transparent;transition:all .2s;font-weight:500;position:relative}
.nb:hover{color:var(--text);background:var(--glow2)}
.nb.on{color:var(--accent2);background:var(--glow);border-left-color:var(--accent);font-weight:600}
.nb.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:3px 0 0 3px}
.nb .ni{width:20px;text-align:center;font-size:16px;opacity:.7}
.nb.on .ni{opacity:1}
.sb-ft{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border)}
.sb-ft .user-card{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-ft .avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.sb-ft .uname{font-size:13px;font-weight:600;color:var(--text)}
.sb-ft .urole{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* === BUTTONS === */
.btn{padding:9px 18px;border-radius:var(--radius2);border:none;font-weight:600;cursor:pointer;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:7px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}
.bp{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}
.bp:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(108,92,231,.4)}
.bs2{background:linear-gradient(135deg,var(--green),#059669);color:#fff;box-shadow:0 4px 15px rgba(52,211,153,.25)}
.bg{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.bg:hover{border-color:var(--accent);color:var(--accent2);background:var(--glow2)}
.bd{background:transparent;border:1px solid rgba(248,113,113,.25);color:var(--red)}
.bd:hover{background:rgba(248,113,113,.08)}
.bsm{padding:7px 14px;font-size:12px;border-radius:8px}
.bxs{padding:5px 10px;font-size:11px;border-radius:6px}
.blg{padding:14px 28px;font-size:15px;border-radius:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.boff{background:var(--bg3)!important;color:var(--text3)!important;cursor:not-allowed;box-shadow:none!important}

/* === INPUTS === */
.inp{width:100%;padding:12px 16px;border-radius:var(--radius2);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:all .2s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.inp::placeholder{color:var(--text3)}
.lbl{display:block;color:var(--text2);font-size:12px;margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.ig{margin-bottom:16px}

/* === CARDS === */
.card{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:var(--radius);padding:22px 24px;border:1px solid var(--border);transition:all .3s;position:relative}
.card:hover{border-color:var(--border2);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.card+.card{margin-top:12px}
.card-glow{box-shadow:0 0 40px var(--glow)}

/* === STATUS === */
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;position:relative}
.dg{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.6)}
.dg::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(52,211,153,.2);animation:pulse 2s infinite}
.dr{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.5)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0}}

/* === TAGS === */
.tag{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px;letter-spacing:.3px;text-transform:uppercase}
.tc{background:rgba(108,92,231,.15);color:var(--accent2);border:1px solid rgba(108,92,231,.2)}
.tm{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.ta{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.tu{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}

/* === MODAL === */
.mo{position:fixed;inset:0;background:rgba(6,8,15,.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ml{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:20px;padding:32px;width:100%;border:1px solid var(--border2);overflow-y:auto;max-height:85vh;box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 60px var(--glow);animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ms{max-width:460px}.mm{max-width:640px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.mh h2{color:var(--text);font-size:20px;font-weight:700}
.mc{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:18px;cursor:pointer;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mc:hover{color:var(--text);border-color:var(--accent);background:var(--glow)}

/* === NOTIFY === */
.nt{position:fixed;top:24px;right:24px;z-index:2000;padding:14px 22px;border-radius:14px;color:#fff;font-size:14px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.4);transition:all .3s;opacity:0;transform:translateY(-10px) scale(.95);pointer-events:none;backdrop-filter:blur(10px)}
.nt.show{opacity:1;transform:translateY(0) scale(1)}
.ni{background:linear-gradient(135deg,rgba(108,92,231,.9),rgba(99,102,241,.9));border:1px solid rgba(165,148,249,.3)}
.ns{background:linear-gradient(135deg,rgba(5,150,105,.9),rgba(16,185,129,.9));border:1px solid rgba(52,211,153,.3)}
.ne{background:linear-gradient(135deg,rgba(220,38,38,.9),rgba(239,68,68,.9));border:1px solid rgba(248,113,113,.3)}

/* === CONNECT OPTIONS === */
.co{display:flex;align-items:flex-start;gap:16px;padding:18px;border-radius:14px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;width:100%;text-align:left;transition:all .25s}
.co:hover{border-color:var(--accent);background:var(--glow);transform:translateX(4px);box-shadow:0 4px 20px var(--glow)}
.co .ci{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.co:nth-child(1) .ci{background:linear-gradient(135deg,var(--accent),#8b5cf6)}
.co:nth-child(2) .ci{background:linear-gradient(135deg,var(--cyan),#0891b2)}
.co:nth-child(3) .ci{background:linear-gradient(135deg,var(--orange),#ea580c)}

/* === PLACEMENT === */
.pb{flex:1;padding:12px;border-radius:var(--radius2);cursor:pointer;font-weight:600;font-size:13px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .2s;text-align:center}
.pb.on{border-color:var(--accent);background:var(--glow);color:var(--accent2);box-shadow:0 0 20px var(--glow)}

/* === CODE BLOCK === */
.cb{position:relative;margin-top:14px}
.cb pre{background:var(--bg);color:var(--text);padding:18px;border-radius:var(--radius2);font-size:11px;overflow:auto;max-height:200px;border:1px solid var(--border2);font-family:'Fira Code',monospace;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.cb .cp{position:absolute;top:10px;right:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;font-weight:600;transition:all .2s}
.cb .cp:hover{border-color:var(--accent);color:var(--accent2)}

/* === LOGIN === */
.lw{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative}
.lw::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);pointer-events:none}
.lbox{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:24px;padding:48px 40px;width:400px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 80px var(--glow);border:1px solid var(--border2);position:relative;z-index:1}
.lbox .brand-big{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px}
.lbox .brand-big .icon{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 30px rgba(108,92,231,.4)}
.lbox h1{font-size:28px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* === STATS === */
.stats{display:flex;gap:12px;margin-bottom:28px}
.stat-card{flex:1;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}
.stat-card .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

/* === LINKS LIST === */
.link-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius2);font-size:12px;transition:all .2s;border:1px solid transparent}
.link-item:hover{background:var(--glow2);border-color:var(--border)}
.link-del{background:none;border:1px solid transparent;color:var(--text3);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px;transition:all .2s;opacity:.4}
.link-del:hover{color:var(--red);opacity:1;border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.08)}

/* === SECTION === */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.sec-header h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.sec-header h1 span{background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* === LOGS === */
.lr{display:flex;gap:14px;padding:10px 14px;border-radius:var(--radius2);font-size:13px;transition:background .2s}
.lr:nth-child(odd){background:rgba(17,24,39,.5)}
.lr:hover{background:var(--glow2)}

/* === USERS === */
.ur{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--radius);background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border)}
.ur+.ur{margin-top:8px}

/* === STEPS === */
ol.st{color:var(--text2);font-size:13px;line-height:2;padding-left:20px}
ol.st code{color:var(--cyan);background:rgba(34,211,238,.1);padding:2px 8px;border-radius:6px;font-size:12px}

.sb-box{margin-top:18px;padding:12px 16px;background:var(--bg);border-radius:var(--radius2);font-size:11px;color:var(--text3);border:1px solid var(--border)}
.sb-box code{color:var(--accent2)}

.empty-state{text-align:center;padding:80px 20px}
.empty-state .icon{font-size:64px;margin-bottom:16px;filter:grayscale(.5)}
.empty-state .title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}
.empty-state .desc{font-size:14px;color:var(--text3);margin-bottom:24px}

@media(max-width:768px){
  .sb{width:70px;overflow:hidden}
  .sb-logo h1,.sb-logo small,.nb .nl,.sb-ft .uname,.sb-ft .urole{display:none}
  .nb{justify-content:center;padding:14px 0}
  .mn{margin-left:70px;padding:20px}
  .stats{flex-direction:column}
}
</style>
</head>
<body>
<div id="nt" class="nt ni"></div>
<div id="app"></div>
<script>
const VER='v3_'+location.hostname;
let D={li:false,cu:null,sites:[],logs:[],users:[{id:'admin',name:'Admin',role:'admin',pass:'admin'}],tab:'sites',modal:null,ckid:null};

function sv(){try{localStorage.setItem(VER,JSON.stringify({sites:D.sites,logs:D.logs,users:D.users}))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem(VER));if(d){D.sites=(d.sites||[]).map(s=>({...s,connected:false,connectionMethod:null}));D.logs=d.logs||[];if(d.users&&d.users.length)D.users=d.users;}}catch(e){}}

function gs(id){return D.sites.find(s=>s.id===id)}
function gensec(){let r='';for(let i=0;i<32;i++)r+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];return r}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fmt(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('ru')}catch{return iso}}
function notify(m,t='info'){const e=document.getElementById('nt');e.className='nt n'+t[0]+' show';e.textContent=m;setTimeout(()=>e.classList.remove('show'),3500)}
function log(a,d){D.logs.push({t:new Date().toISOString(),a,d,u:D.cu?.id||'—'});sv()}
function dlf(c,f){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=f;a.click()}
function cp(t){navigator.clipboard.writeText(t).then(()=>notify('Скопировано!')).catch(()=>notify('Ошибка','error'))}
function baseUrl(s){return s.url.replace(/\/+$/,'')}

async function doCheck(sid){
  const site=gs(sid);if(!site)return;D.ckid=sid;render();
  let connected=false,method=null;
  const token='tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  try{const c=new AbortController();const t=setTimeout(()=>c.abort(),10000);
    const r=await fetch(baseUrl(site)+'/wp-json/lp-api/v2/verify',{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({token}),signal:c.signal,mode:'cors'});
    clearTimeout(t);if(r.status===200){const txt=await r.text();try{const j=JSON.parse(txt);if(j.verified===token){connected=true;method=j.method||'plugin';}}catch(e){}}}catch(e){}
  if(!connected){try{const c=new AbortController();const t=setTimeout(()=>c.abort(),10000);
    const r=await fetch(baseUrl(site)+'/lp-connector.php?action=verify',{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({token}),signal:c.signal,mode:'cors'});
    clearTimeout(t);if(r.status===200){const txt=await r.text();try{const j=JSON.parse(txt);if(j.verified===token){connected=true;method='file';}}catch(e){}}}catch(e){}}
  for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i]={...D.sites[i],connected,connectionMethod:connected?method:null,lastCheck:new Date().toISOString()}}}
  log(connected?'Связь ✓':'Связь ✗',site.url+(method?' ('+method+')':''));
  D.ckid=null;D.modal=null;sv();notify(connected?'✅ Связь установлена ('+method+')':'❌ Нет связи',connected?'success':'error');render();
}

async function doPlace(sid){
  const site=gs(sid);if(!site||!site.connected)return notify('Нет связи','error');
  const html=document.getElementById('ph')?.value?.trim();
  const pl=document.querySelector('.pb.on')?.dataset?.pl||'homepage';
  if(!html)return notify('Вставьте HTML','error');
  const isF=site.connectionMethod==='file';
  const url=isF?baseUrl(site)+'/lp-connector.php?action=place':baseUrl(site)+'/wp-json/lp-api/v2/place';
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({html,placement:pl})});
    const j=await r.json();
    if(j.status==='placed'){const tmp=document.createElement('div');tmp.innerHTML=html;const pv=(tmp.textContent||html).substring(0,80);
      for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=[...D.sites[i].links,{html,placement:pl,id:j.id,pv,at:new Date().toISOString()}]}}
      log('Ссылка ✓',pv+' → '+site.url);D.modal=null;sv();notify('✅ Размещено!','success');
    }else notify('Ошибка: '+(j.error||j.message||JSON.stringify(j)),'error');
  }catch(e){notify('Ошибка: '+e.message,'error')}render();
}

async function doRemoveLink(sid,linkId,linkIdx){
  const site=gs(sid);if(!site)return;
  if(!site.connected){for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=D.sites[i].links.filter((_,idx)=>idx!==linkIdx)}}
    log('Удалена (лок.)',site.url);sv();notify('Удалена');render();return;}
  const isF=site.connectionMethod==='file';
  const url=isF?baseUrl(site)+'/lp-connector.php?action=remove':baseUrl(site)+'/wp-json/lp-api/v2/remove';
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({id:linkId})});
    const j=await r.json();if(j.status==='removed'){for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=D.sites[i].links.filter((_,idx)=>idx!==linkIdx)}}
      log('Ссылка удалена',site.url);sv();notify('✅ Удалена','success');}else notify('Ошибка','error');
  }catch(e){notify('Ошибка: '+e.message,'error')}render();
}

function exportSite(sid){const s=gs(sid);if(!s||!s.links.length)return notify('Нет ссылок','error');
  let csv='Сайт\tHTML\tРазмещение\tДата\n';s.links.forEach(l=>{csv+=`${s.url}\t${(l.html||l.pv||'').replace(/[\t\n]/g,' ')}\t${l.placement==='sitewide'?'Сквозное':'Главная'}\t${fmt(l.at)}\n`});
  dlf(csv,s.name.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_')+'_links.tsv');notify('📥 Экспорт скачан');}

        <textarea class="inp" id="ph" rows="5" placeholder='<a href="https://example.com">Текст ссылки</a>' style="font-family:'Fira Code',monospace;font-size:13px;resize:vertical;min-height:100px"></textarea>
        <div style="color:var(--text3);font-size:11px;margin-top:6px">Поддерживается любой HTML: ссылки, блоки текста, баннеры</div></div>
      <div class="ig"><label class="lbl">Тип размещения</label>
        <div style="display:flex;gap:8px"><button class="pb on" data-pl="homepage">🏠 Главная страница</button><button class="pb" data-pl="sitewide">🌐 Все страницы</button></div></div>
      <button class="btn bp blg" style="width:100%;margin-top:8px" id="dpl">⚡ Разместить</button>
    </div></div>`}
  return''}

// === BIND ===
function bindAll(){
  document.querySelectorAll('[data-tab]').forEach(e=>e.onclick=()=>{D.tab=e.dataset.tab;render()});
  const o=document.getElementById('out');if(o)o.onclick=()=>{D.li=false;D.cu=null;render()};
  const ab=document.getElementById('abtn');
  if(ab)ab.onclick=()=>{const n=document.getElementById('an').value.trim();let u=document.getElementById('au').value.trim();
    if(!n||!u)return notify('Заполните все поля','error');if(!u.startsWith('http'))u='https://'+u;u=u.replace(/\/+$/,'');
    if(D.sites.some(s=>s.url===u))return notify('Сайт уже добавлен','error');
    D.sites.push({id:Date.now().toString(),url:u,name:n,cms:document.getElementById('ac').value,secret:gensec(),connected:false,connectionMethod:null,links:[],addedAt:new Date().toISOString(),lastCheck:null});
    log('Добавлен',u);D.tab='sites';notify('✅ Сайт добавлен','success');render()};
  const ea=document.getElementById('exp-all');if(ea)ea.onclick=()=>exportAll();
  document.querySelectorAll('[data-do]').forEach(e=>e.onclick=()=>{
    const id=e.dataset.id,idx=parseInt(e.dataset.idx),act=e.dataset.do;
    if(act==='conn'){D.modal={t:'conn',sid:id,v:null};render()}
    if(act==='chk')doCheck(id);
    if(act==='place'){D.modal={t:'place',sid:id};render()}
    if(act==='del'){if(confirm('Удалить сайт?')){D.sites=D.sites.filter(s=>s.id!==id);sv();notify('Удалён');render()}}
    if(act==='delu'){D.users.splice(idx,1);sv();notify('Удалён');render()}
    if(act==='export')exportSite(id);
    if(act==='rmlink'){const sid=e.dataset.sid,lid=e.dataset.lid,lidx=parseInt(e.dataset.lidx);
      if(confirm('Удалить ссылку с сайта?'))doRemoveLink(sid,lid,lidx)}});
  const cx=document.getElementById('cx');if(cx)cx.onclick=()=>{D.modal=null;render()};
  const ov=document.getElementById('ov');if(ov)ov.onclick=e=>{if(e.target===ov){D.modal=null;render()}};
  document.querySelectorAll('[data-cv]').forEach(e=>e.onclick=()=>{if(D.modal)D.modal.v=e.dataset.cv==='back'?null:e.dataset.cv;render()});
  const dlp=document.getElementById('dlp');if(dlp&&D.modal){const s=gs(D.modal.sid);if(s)dlp.onclick=()=>dlf(mkPlugin(s.secret),'link-placer-v3.php')}
  const dfl=document.getElementById('dlfl');if(dfl&&D.modal){const s=gs(D.modal.sid);if(s)dfl.onclick=()=>dlf(mkFile(s.secret),'lp-connector.php')}
  const cpf=document.getElementById('cpf');if(cpf&&D.modal){const s=gs(D.modal.sid);if(s)cpf.onclick=()=>cp(mkFunc(s.secret))}
  const mchk=document.getElementById('mchk');if(mchk&&D.modal)mchk.onclick=()=>doCheck(D.modal.sid);
  const gc=document.getElementById('gc');if(gc&&D.modal)gc.onclick=()=>{D.modal={t:'conn',sid:D.modal.sid,v:null};render()};
  document.querySelectorAll('[data-pl]').forEach(e=>e.onclick=()=>{document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));e.classList.add('on')});
  const dpl=document.getElementById('dpl');if(dpl&&D.modal)dpl.onclick=()=>doPlace(D.modal.sid);
  const ubtn=document.getElementById('ubtn');
  if(ubtn)ubtn.onclick=()=>{const i=document.getElementById('ui').value.trim(),n=document.getElementById('un').value.trim(),p=document.getElementById('up').value,r=document.getElementById('uur').value;
    if(!i||!n||!p)return notify('Заполните все поля','error');if(D.users.some(u=>u.id===i))return notify('ID занят','error');
    D.users.push({id:i,name:n,pass:p,role:r});sv();notify('✅ Добавлен','success');render()}}

ld();render();
</script>
</body>
</html>
