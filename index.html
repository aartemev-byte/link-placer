.co{display:flex;align-items:flex-start;gap:16px;padding:18px;border-radius:14px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;width:100%;text-align:left;transition:all .25s}.co:hover{border-color:var(--accent);background:var(--glow);transform:translateX(4px)}.co .ci{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

.cb{position:relative;margin-top:14px}.cb pre{background:var(--bg);color:var(--text);padding:18px;border-radius:var(--radius2);font-size:11px;overflow:auto;max-height:220px;border:1px solid var(--border2);font-family:'Fira Code',monospace;line-height:1.6;white-space:pre-wrap;word-break:break-all}.cb .cp{position:absolute;top:10px;right:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;font-weight:600}.cb .cp:hover{border-color:var(--accent);color:var(--accent2)}
.lw{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative}.lw::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--glow) 0%,transparent 70%);pointer-events:none}.lbox{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:24px;padding:48px 40px;width:400px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 80px var(--glow);border:1px solid var(--border2);position:relative;z-index:1}.lbox h1{font-size:28px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:12px;margin-bottom:28px}.stat-card{flex:1;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}.stat-card .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.stat-card .label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

ol.st{color:var(--text2);font-size:13px;line-height:2;padding-left:20px}ol.st code{color:var(--cyan);background:rgba(34,211,238,.1);padding:2px 8px;border-radius:6px;font-size:12px}

.empty-state{text-align:center;padding:80px 20px}.empty-state .icon{font-size:64px;margin-bottom:16px}.empty-state .title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}.empty-state .desc{font-size:14px;color:var(--text3);margin-bottom:24px}

<body>
<div id="nt" class="nt ni"></div>
<div id="app"></div>
<script>
const VER='lf4_'+location.hostname;
let D={li:false,cu:null,sites:[],logs:[],users:[{id:'admin',name:'Admin',role:'admin',pass:'admin'}],tab:'sites',modal:null,ckid:null};
function sv(){try{localStorage.setItem(VER,JSON.stringify({sites:D.sites,logs:D.logs,users:D.users}))}catch(e){}}
function ld(){try{const d=JSON.parse(localStorage.getItem(VER));if(d){D.sites=(d.sites||[]).map(s=>({...s,connected:false,connectionMethod:null}));D.logs=d.logs||[];if(d.users&&d.users.length)D.users=d.users;}}catch(e){}}
function gs(id){return D.sites.find(s=>s.id===id)}
function gensec(){let r='';for(let i=0;i<32;i++)r+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];return r}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fmt(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('ru')}catch{return iso}}
function notify(m,t='info'){const e=document.getElementById('nt');e.className='nt n'+t[0]+' show';e.textContent=m;setTimeout(()=>e.classList.remove('show'),3500)}
function log(a,d){D.logs.push({t:new Date().toISOString(),a,d,u:D.cu?.id||'—'});sv()}
function dlFile(c,f){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=f;a.click()}
function cpTxt(t){navigator.clipboard.writeText(t).then(()=>notify('Скопировано!')).catch(()=>notify('Ошибка','error'))}
function baseUrl(s){return s.url.replace(/\/+$/,'')}

// ========== CHECK ==========
async function doCheck(sid){
  const site=gs(sid);if(!site)return;D.ckid=sid;render();
  let connected=false,method=null;
  const token='tk_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  const endpoints=[
    {url:baseUrl(site)+'/wp-json/lp-api/v2/verify',m:'plugin'},
    {url:baseUrl(site)+'/lp-connector.php?action=verify',m:'file'},
    {url:baseUrl(site)+'/lp-modx.php?action=verify',m:'file-modx'},
  ];
  for(const ep of endpoints){
    if(connected)break;
    try{const c=new AbortController();const t=setTimeout(()=>c.abort(),10000);
      const r=await fetch(ep.url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({token}),signal:c.signal,mode:'cors'});
      clearTimeout(t);if(r.status===200){const txt=await r.text();try{const j=JSON.parse(txt);if(j.verified===token){connected=true;method=j.method||ep.m;}}catch(e){}}}catch(e){}
  }
  for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i]={...D.sites[i],connected,connectionMethod:connected?method:null,lastCheck:new Date().toISOString()}}}
  log(connected?'Связь ✓':'Связь ✗',site.url+(method?' ('+method+')':''));
  D.ckid=null;D.modal=null;sv();notify(connected?'✅ Связь ('+method+')':'❌ Нет связи',connected?'success':'error');render();
}

// ========== PLACE ==========
async function doPlace(sid){
  const site=gs(sid);if(!site||!site.connected)return notify('Нет связи','error');
  const html=document.getElementById('ph')?.value?.trim();
  const pl=document.querySelector('.pb.on')?.dataset?.pl||'homepage';
  if(!html)return notify('Вставьте HTML','error');
  const m=site.connectionMethod||'';
  let url;
  if(m.includes('modx')||m==='snippet'||m==='plugin-modx')url=baseUrl(site)+'/lp-modx.php?action=place';
  else if(m==='file')url=baseUrl(site)+'/lp-connector.php?action=place';
  else url=baseUrl(site)+'/wp-json/lp-api/v2/place';
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({html,placement:pl})});
    const j=await r.json();
    if(j.status==='placed'){const tmp=document.createElement('div');tmp.innerHTML=html;const pv=(tmp.textContent||html).substring(0,80);
      for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=[...D.sites[i].links,{html,placement:pl,id:j.id,pv,at:new Date().toISOString()}]}}
      log('Ссылка ✓',pv+' → '+site.url);D.modal=null;sv();notify('✅ Размещено!','success');
    }else notify('Ошибка: '+(j.error||j.message||JSON.stringify(j)),'error');
  }catch(e){notify('Ошибка: '+e.message,'error')}render();
}

// ========== REMOVE LINK ==========
async function doRemoveLink(sid,linkId,linkIdx){
  const site=gs(sid);if(!site)return;
  if(!site.connected){for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=D.sites[i].links.filter((_,idx)=>idx!==linkIdx)}}
    log('Удалена (лок.)',site.url);sv();notify('Удалена');render();return;}
  const m=site.connectionMethod||'';
  let url;
  if(m.includes('modx')||m==='snippet'||m==='plugin-modx')url=baseUrl(site)+'/lp-modx.php?action=remove';
  else if(m==='file')url=baseUrl(site)+'/lp-connector.php?action=remove';
  else url=baseUrl(site)+'/wp-json/lp-api/v2/remove';
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({id:linkId})});
    const j=await r.json();if(j.status==='removed'){for(let i=0;i<D.sites.length;i++){if(D.sites[i].id===sid){D.sites[i].links=D.sites[i].links.filter((_,idx)=>idx!==linkIdx)}}
      log('Удалена',site.url);sv();notify('✅ Удалена','success');}else notify('Ошибка','error');
  }catch(e){notify('Ошибка: '+e.message,'error')}render();
}

function exportSite(sid){const s=gs(sid);if(!s||!s.links.length)return notify('Нет ссылок','error');
  let csv='Сайт\tCMS\tHTML\tРазмещение\tДата\n';s.links.forEach(l=>{csv+=`${s.url}\t${s.cms}\t${(l.html||l.pv||'').replace(/[\t\n]/g,' ')}\t${l.placement==='sitewide'?'Сквозное':'Главная'}\t${fmt(l.at)}\n`});
  dlFile(csv,s.name.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_')+'_links.tsv');notify('📥 Экспорт скачан');}
function exportAll(){let n=0,csv='Сайт\tCMS\tHTML\tРазмещение\tДата\n';
  D.sites.forEach(s=>s.links.forEach(l=>{csv+=`${s.url}\t${s.cms}\t${(l.html||l.pv||'').replace(/[\t\n]/g,' ')}\t${l.placement==='sitewide'?'Сквозное':'Главная'}\t${fmt(l.at)}\n`;n++}));
  if(!n)return notify('Нет ссылок','error');dlFile(csv,'all_links_'+new Date().toISOString().slice(0,10)+'.tsv');notify('📥 Всего '+n);}

// ========== MODX CODE ==========
function mkModxFile(sec){return`<?php
/**
 * LinkForge Connector for MODX Revolution & Evo
 * Place as lp-modx.php in site root
 */
header('Content-Type: application/json');
header('Access-Control-Allow-Origin: *');
header('Access-Control-Allow-Headers: Content-Type, X-LP-Secret');
header('Access-Control-Allow-Methods: GET, POST, OPTIONS');

if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }

$action = $_GET['action'] ?? '';
$secret = $_SERVER['HTTP_X_LP_SECRET'] ?? '';
$valid_secret = '${sec}';
$input = json_decode(file_get_contents('php://input'), true);

// Storage file path
$storage_file = __DIR__ . '/lp_links_data.json';

function lp_read_links($file) {
    if (!file_exists($file)) return [];
    $data = json_decode(file_get_contents($file), true);
    return is_array($data) ? $data : [];
}
function lp_write_links($file, $links) {
    file_put_contents($file, json_encode($links, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
}

// Verify
if ($action === 'verify') {
    if ($secret !== $valid_secret) {
        http_response_code(403);
        echo json_encode(['error' => 'bad secret']);
        exit;
    }
    echo json_encode([
        'verified' => $input['token'] ?? '',
        'method' => 'file-modx',
        'cms' => 'modx'
    ]);
    exit;
}

if ($secret !== $valid_secret) {
    http_response_code(403);
    echo json_encode(['error' => 'forbidden']);
    exit;
}

// Place
if ($action === 'place') {
    $html = $input['html'] ?? '';
    $placement = $input['placement'] ?? 'homepage';
    if (!$html) {
        http_response_code(400);
        echo json_encode(['error' => 'html required']);
        exit;
    }
    // Basic sanitization
    $html = strip_tags($html, '<a><b><strong><i><em><span><div><p><br><img><ul><ol><li>');
    $links = lp_read_links($storage_file);
    $id = 'lp_' . uniqid();
    $links[$id] = [
        'html' => $html,
        'pl' => $placement,
        't' => date('Y-m-d H:i:s')
    ];
    lp_write_links($storage_file, $links);
    echo json_encode(['status' => 'placed', 'id' => $id]);
    exit;
}

// Links
if ($action === 'links') {
    echo json_encode(lp_read_links($storage_file));
    exit;
}

// Remove
if ($action === 'remove') {
    $id = $input['id'] ?? '';
    $links = lp_read_links($storage_file);
    unset($links[$id]);
    lp_write_links($storage_file, $links);
    echo json_encode(['status' => 'removed']);
    exit;
}

echo json_encode(['error' => 'unknown action']);`}

function mkModxSnippet(sec){return`<?php
/**
 * LinkForge Snippet for MODX Revolution
 * Create as Snippet named "LinkForge" in Elements -> Snippets
 * 
 * Usage in template:
 *   [[LinkForge]] — shows links for current page
 *   [[LinkForge? &placement=\`sitewide\`]] — shows sitewide links only
 *   [[LinkForge? &placement=\`all\`]] — shows all links
 */

$placement = $modx->getOption('placement', $scriptProperties, 'auto');
$storage_file = MODX_BASE_PATH . 'lp_links_data.json';

if (!file_exists($storage_file)) return '';

$links = json_decode(file_get_contents($storage_file), true);
if (!is_array($links) || empty($links)) return '';

$is_home = ($modx->resource && $modx->resource->get('id') == $modx->getOption('site_start'));
$output = '';

foreach ($links as $link) {
    $lpl = $link['pl'] ?? 'homepage';
    
    if ($placement === 'auto') {
        // homepage links only on homepage, sitewide everywhere
        if ($lpl === 'homepage' && !$is_home) continue;
    } elseif ($placement !== 'all' && $lpl !== $placement) {
        continue;
    }
    
    $output .= ($link['html'] ?? '');
}

return $output;`}

function mkModxPlugin(sec){return`<?php

 * 
 * This automatically inserts links before </body>
 */

$storage_file = MODX_BASE_PATH . 'lp_links_data.json';

if (!file_exists($storage_file)) return;

$links = json_decode(file_get_contents($storage_file), true);
if (!is_array($links) || empty($links)) return;

$is_home = ($modx->resource && $modx->resource->get('id') == $modx->getOption('site_start'));

foreach ($links as $link) {

}

if ($html) {
    $output = &$modx->resource->_output;
    $output = str_replace('</body>', $html . '</body>', $output);
}`}
