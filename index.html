<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkForge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--bg2:#0c1020;--bg3:#111827;--accent:#6c5ce7;--accent2:#a78bfa;--cyan:#22d3ee;--green:#34d399;--red:#f87171;--orange:#fb923c;--pink:#f472b6;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--border:rgba(100,116,139,.12);--border2:rgba(100,116,139,.25);--glow:rgba(108,92,231,.15);--glow2:rgba(108,92,231,.08);--radius:14px;--radius2:10px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}input,select,button,textarea{font-family:inherit}a{color:var(--accent2);text-decoration:none}::selection{background:var(--accent);color:#fff}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(108,92,231,.06),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(34,211,238,.04),transparent 50%);animation:bgM 20s ease-in-out infinite;z-index:0;pointer-events:none}@keyframes bgM{0%,100%{transform:translate(0)}50%{transform:translate(-2%,-1%)}}
.app{display:flex;min-height:100vh;position:relative;z-index:1}.sb{width:260px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}.mn{flex:1;margin-left:260px;padding:32px 40px;min-height:100vh}
.sb-logo{padding:28px 24px 24px}.sb-logo .brand{display:flex;align-items:center;gap:12px}.sb-logo .brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(108,92,231,.4)}.sb-logo h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sb-logo small{font-size:10px;color:var(--text3);display:block;letter-spacing:1px;text-transform:uppercase;font-weight:600}.sb-sep{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:4px 20px 8px}
.nb{display:flex;align-items:center;gap:12px;padding:12px 24px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:14px;width:100%;text-align:left;border-left:3px solid transparent;transition:all .2s;font-weight:500}.nb:hover{color:var(--text);background:var(--glow2)}.nb.on{color:var(--accent2);background:var(--glow);border-left-color:var(--accent);font-weight:600}
.sb-ft{margin-top:auto;padding:20px 24px;border-top:1px solid var(--border)}.sb-ft .avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
.btn{padding:9px 18px;border-radius:var(--radius2);border:none;font-weight:600;cursor:pointer;font-size:13px;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.bp{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.3)}.bp:hover{transform:translateY(-1px)}.bs2{background:linear-gradient(135deg,var(--green),#059669);color:#fff}.bg{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}.bg:hover{border-color:var(--accent);color:var(--accent2)}.bd{background:transparent;border:1px solid rgba(248,113,113,.25);color:var(--red)}.bsm{padding:7px 14px;font-size:12px;border-radius:8px}.bxs{padding:5px 10px;font-size:11px;border-radius:6px}.blg{padding:14px 28px;font-size:15px;border-radius:12px}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}.boff{background:var(--bg3)!important;color:var(--text3)!important;cursor:not-allowed}
.inp{width:100%;padding:12px 16px;border-radius:var(--radius2);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:all .2s}.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}.inp::placeholder{color:var(--text3)}.lbl{display:block;color:var(--text2);font-size:12px;margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}.ig{margin-bottom:16px}
.card{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:var(--radius);padding:22px 24px;border:1px solid var(--border);transition:all .3s}.card:hover{border-color:var(--border2)}.card+.card{margin-top:12px}.card-glow{box-shadow:0 0 40px var(--glow)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;position:relative}.dg{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.6)}.dg::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(52,211,153,.2);animation:pulse 2s infinite}.dr{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,.5)}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0}}
.tag{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;letter-spacing:.3px;text-transform:uppercase}.tc{background:rgba(108,92,231,.15);color:var(--accent2);border:1px solid rgba(108,92,231,.2)}.tm{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}.ta{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}.tu{background:rgba(34,211,238,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.2)}.tmodx{background:rgba(251,146,60,.12);color:var(--orange);border:1px solid rgba(251,146,60,.2)}
.mo{position:fixed;inset:0;background:rgba(6,8,15,.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .2s}@keyframes fi{from{opacity:0}to{opacity:1}}.ml{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:20px;padding:32px;width:100%;border:1px solid var(--border2);overflow-y:auto;max-height:85vh;box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 60px var(--glow);animation:su .3s}@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}.ms{max-width:460px}.mm{max-width:640px}.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.mh h2{color:var(--text);font-size:20px;font-weight:700}.mc{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);font-size:18px;cursor:pointer;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.nt{position:fixed;top:24px;right:24px;z-index:2000;padding:14px 22px;border-radius:14px;color:#fff;font-size:14px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.4);transition:all .3s;opacity:0;transform:translateY(-10px);pointer-events:none}.nt.show{opacity:1;transform:translateY(0)}.ni{background:linear-gradient(135deg,rgba(108,92,231,.9),rgba(99,102,241,.9))}.ns{background:linear-gradient(135deg,rgba(5,150,105,.9),rgba(16,185,129,.9))}.ne{background:linear-gradient(135deg,rgba(220,38,38,.9),rgba(239,68,68,.9))}
.co{display:flex;align-items:flex-start;gap:16px;padding:18px;border-radius:14px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;width:100%;text-align:left;transition:all .25s}.co:hover{border-color:var(--accent);background:var(--glow);transform:translateX(4px)}.co .ci{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pb{flex:1;padding:12px;border-radius:var(--radius2);cursor:pointer;font-weight:600;font-size:13px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .2s;text-align:center}.pb.on{border-color:var(--accent);background:var(--glow);color:var(--accent2)}
.cb{position:relative;margin-top:14px}.cb pre{background:var(--bg);color:var(--text);padding:18px;border-radius:var(--radius2);font-size:11px;overflow:auto;max-height:220px;border:1px solid var(--border2);font-family:monospace;line-height:1.6;white-space:pre-wrap;word-break:break-all}.cb .cp{position:absolute;top:10px;right:10px;padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;font-weight:600}
.lw{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative}.lw::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,var(--glow),transparent 70%);pointer-events:none}.lbox{background:linear-gradient(135deg,var(--bg3),var(--bg2));border-radius:24px;padding:48px 40px;width:400px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 80px var(--glow);border:1px solid var(--border2);position:relative;z-index:1}.lbox h1{font-size:28px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stats{display:flex;gap:12px;margin-bottom:28px}.stat-card{flex:1;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center}.stat-card .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.stat-card .label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.link-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius2);font-size:12px;transition:all .2s;border:1px solid transparent}.link-item:hover{background:var(--glow2);border-color:var(--border)}.link-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px;opacity:.4}.link-del:hover{color:var(--red);opacity:1}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}.sec-header h1{font-size:26px;font-weight:800}.sec-header h1 span{background:linear-gradient(135deg,var(--accent2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lr{display:flex;gap:14px;padding:10px 14px;border-radius:var(--radius2);font-size:13px}.lr:nth-child(odd){background:rgba(17,24,39,.5)}
.ur{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-radius:var(--radius);background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border)}.ur+.ur{margin-top:8px}
ol.st{color:var(--text2);font-size:13px;line-height:2;padding-left:20px}ol.st code{color:var(--cyan);background:rgba(34,211,238,.1);padding:2px 8px;border-radius:6px;font-size:12px}
.sb-box{margin-top:18px;padding:12px 16px;background:var(--bg);border-radius:var(--radius2);font-size:11px;color:var(--text3);border:1px solid var(--border)}.sb-box code{color:var(--accent2)}
.empty-state{text-align:center;padding:80px 20px}.empty-state .icon{font-size:64px;margin-bottom:16px}.empty-state .title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}.empty-state .desc{font-size:14px;color:var(--text3);margin-bottom:24px}
@media(max-width:768px){.sb{width:70px;overflow:hidden}.sb-logo h1,.sb-logo small,.nb .nl{display:none}.nb{justify-content:center;padding:14px 0}.mn{margin-left:70px;padding:20px}.stats{flex-direction:column}}
</style>
</head>
<body>
<div id="nt" class="nt ni"></div>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
