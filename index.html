<body>
<div id="notify" class="notify notify-info"></div>
<div id="app"></div>

<script>
// === STORAGE KEY v2 — forces fresh start ===
const STORAGE_KEY = 'lp_v2';

let S = {
  loggedIn:false, currentUser:null,
  sites:[], logs:[], users:[{id:'admin',name:'Admin',role:'admin',pass:'admin'}],
  tab:'sites',
  modal:null, // {type:'connect'|'place', siteId:string, view:null|'plugin'|'file'|'functions'}
  checkingId:null,
};

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({sites:S.sites,logs:S.logs,users:S.users}))}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(d){
      // ALWAYS reset connected to false on load
      S.sites=(d.sites||[]).map(s=>({...s,connected:false,connectionMethod:null}));
      S.logs=d.logs||[];
      S.users=d.users&&d.users.length?d.users:S.users;
    }
  }catch(e){}
}

function getSite(id){return S.sites.find(s=>s.id===id)}
function setSite(id,patch){
  S.sites=S.sites.map(s=>s.id===id?{...s,...patch}:s);
  save();
}

// === UTILS ===
function genSecret(){let r='';for(let i=0;i<32;i++)r+='abcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*36)];return r}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function fmtDate(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString('ru')}catch{return iso}}
function notify(msg,type='info'){const el=document.getElementById('notify');el.className='notify notify-'+type+' show';el.textContent=msg;setTimeout(()=>el.classList.remove('show'),3500)}
function addLog(action,detail){S.logs.push({time:new Date().toISOString(),action,detail,user:S.currentUser?.id||'—'});save()}
function downloadFile(c,f){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/plain'}));a.download=f;a.click()}
function copyText(t){navigator.clipboard.writeText(t).then(()=>notify('Скопировано!')).catch(()=>notify('Ошибка копирования','error'))}

// === WP CODE GENERATORS ===
function getPluginCode(secret){
return `<?php
/**
 * Plugin Name: Link Placer Connector
 * Version: 2.0.0
 */
if (!defined('ABSPATH')) exit;
add_action('rest_api_init', function() {
    add_action('rest_pre_serve_request', function(){
        header('Access-Control-Allow-Origin: *');
        header('Access-Control-Allow-Headers: Content-Type, X-LP-Secret');
        header('Access-Control-Allow-Methods: GET, POST, OPTIONS');
    });
    register_rest_route('link-placer/v1','/ping',['methods'=>['GET','OPTIONS'],'callback'=>function(){return ['status'=>'ok','cms'=>'wordpress','method'=>'plugin'];},'permission_callback'=>'__return_true']);
    register_rest_route('link-placer/v1','/place',['methods'=>['POST','OPTIONS'],'callback'=>function($req){
        if($req->get_header('X-LP-Secret')!=='${secret}')return new WP_Error('forbidden','',['status'=>403]);
        $p=$req->get_json_params();$html=$p['html']??'';$placement=sanitize_text_field($p['placement']??'homepage');
        if(!$html)return new WP_Error('bad','html required',['status'=>400]);
        $allowed=wp_kses_allowed_html('post');$allowed['a']['target']=true;$allowed['a']['rel']=true;
        $clean=wp_kses($html,$allowed);$links=get_option('lp_placed_links',[]);$id='lp_'.uniqid();
        $links[$id]=['html'=>$clean,'placement'=>$placement,'created'=>current_time('mysql')];
        update_option('lp_placed_links',$links);return['status'=>'placed','id'=>$id];
    },'permission_callback'=>'__return_true']);
    register_rest_route('link-placer/v1','/links',['methods'=>['GET','OPTIONS'],'callback'=>function($req){
        if($req->get_header('X-LP-Secret')!=='${secret}')return new WP_Error('forbidden','',['status'=>403]);
        return get_option('lp_placed_links',[]);
    },'permission_callback'=>'__return_true']);
    register_rest_route('link-placer/v1','/remove',['methods'=>['POST','OPTIONS'],'callback'=>function($req){
        if($req->get_header('X-LP-Secret')!=='${secret}')return new WP_Error('forbidden','',['status'=>403]);
        $id=sanitize_text_field($req->get_json_params()['id']??'');$links=get_option('lp_placed_links',[]);
        unset($links[$id]);update_option('lp_placed_links',$links);return['status'=>'removed'];

});
add_action('wp_footer',function(){
    $links=get_option('lp_placed_links',[]);if(empty($links))return;$home=is_front_page()||is_home();
    foreach($links as $l){if(($l['placement']??'homepage')==='homepage'&&!$home)continue;echo $l['html']??'';}

// === CHECK CONNECTION ===
async function doCheck(siteId){
  const site=getSite(siteId);
  if(!site)return;
  S.checkingId=siteId;
  render();

  let connected=false, method=null;

  // Method 1: REST API (plugin or functions.php)
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(site.url+'/wp-json/link-placer/v1/ping',{signal:ctrl.signal,mode:'cors'});
    clearTimeout(timer);
    if(r.status===200){
      const t=await r.text();
      try{const j=JSON.parse(t);if(j.status==='ok'){connected=true;method=j.method||'plugin';}}catch(e){}
    }
  }catch(e){console.log('ping1 fail',e.message)}

  // Method 2: standalone file
  if(!connected){
    try{
      const ctrl=new AbortController();
      const timer=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(site.url+'/lp-connector.php?action=ping',{signal:ctrl.signal,mode:'cors'});
      clearTimeout(timer);
      if(r.status===200){
        const t=await r.text();
        try{const j=JSON.parse(t);if(j.status==='ok'){connected=true;method='file';}}catch(e){}
      }
    }catch(e){console.log('ping2 fail',e.message)}
  }

  // FORCE UPDATE — directly mutate the array item
  for(let i=0;i<S.sites.length;i++){
    if(S.sites[i].id===siteId){
      S.sites[i] = {...S.sites[i], connected:connected, connectionMethod:connected?method:null, lastCheck:new Date().toISOString()};
    }
  }

  addLog(connected?'Связь установлена':'Связь отсутствует', site.url+(method?' ('+method+')':''));
  S.checkingId=null;
  // Close modals so stale references don't persist
  S.modal=null;
  save();
  notify(connected?'✅ Связь есть ('+method+')':'❌ Нет связи — установите коннектор', connected?'success':'error');
  render();
}

// === PLACE LINK ===
async function doPlace(siteId){
  const site=getSite(siteId);
  if(!site||!site.connected)return notify('Сначала установите связь','error');
  const html=document.getElementById('pl-html')?.value?.trim();
  const placement=document.querySelector('.placement-btn.active')?.dataset?.pl||'homepage';
  if(!html)return notify('Вставьте HTML-код','error');

  const isFile=site.connectionMethod==='file';
  const url=isFile?site.url+'/lp-connector.php?action=place':site.url+'/wp-json/link-placer/v1/place';

  try{
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-LP-Secret':site.secret},body:JSON.stringify({html,placement})});
    const j=await r.json();
    if(j.status==='placed'){
      const tmp=document.createElement('div');tmp.innerHTML=html;
      const preview=(tmp.textContent||html).substring(0,80);
      for(let i=0;i<S.sites.length;i++){
        if(S.sites[i].id===siteId){
          S.sites[i].links=[...S.sites[i].links,{html,placement,id:j.id,preview,placedAt:new Date().toISOString()}];
        }
      }
      addLog('Ссылка размещена',preview+' на '+site.url);
      S.modal=null;
      notify('✅ Ссылка размещена!','success');
    }else{
      notify('Ошибка: '+(j.error||j.message||JSON.stringify(j)),'error');
    }
  }catch(e){notify('Ошибка: '+e.message,'error')}
  render();
}

// === RENDER ===
function render(){
  const app=document.getElementById('app');
  if(!S.loggedIn){
    app.innerHTML=renderLogin();
    bindLogin();
    return;
  }
  app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTab()}</div></div>${renderModal()}`;
  bind();
}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-box">
    <div class="logo">🔗</div><h1>Link Placer</h1><p class="subtitle">Панель управления v2</p>
    <div style="margin-top:24px">
      <div class="input-group"><input class="input" id="li" placeholder="Логин"></div>
      <div class="input-group"><input class="input" id="lp" type="password" placeholder="Пароль"></div>
      <button class="btn btn-primary btn-lg" style="width:100%" id="lb">Войти</button>
      <div class="login-hint">admin / admin</div>
    </div></div></div>`;
}
function bindLogin(){
  const b=document.getElementById('lb');if(!b)return;
  const go=()=>{
    const id=document.getElementById('li').value.trim(),p=document.getElementById('lp').value;
    const u=S.users.find(x=>x.id===id&&x.pass===p);
    if(u){S.currentUser=u;S.loggedIn=true;render()}else notify('Неверные данные','error');
  };
  b.onclick=go;document.getElementById('lp').onkeydown=e=>{if(e.key==='Enter')go()};
}

function renderSidebar(){
  const admin=S.currentUser?.role==='admin';
  const tabs=[{id:'sites',i:'🌐',l:'Сайты'},{id:'add',i:'➕',l:'Добавить'},{id:'logs',i:'📋',l:'Логи'}];
  if(admin)tabs.push({id:'users',i:'👥',l:'Пользователи'});
  return`<div class="sidebar">
    <div class="sidebar-logo"><h1>🔗 Link Placer</h1><small>v2.0</small></div>
    ${tabs.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" data-tab="${t.id}"><span>${t.i}</span><span class="label">${t.l}</span></button>`).join('')}
    <div class="sidebar-footer">
      <div class="user-info">👤 ${S.currentUser?.name}</div>
      <button class="btn btn-ghost btn-sm" style="width:100%" id="logout">Выйти</button>
    </div></div>`;
}

function renderTab(){
  if(S.tab==='add')return renderAdd();
  if(S.tab==='logs')return renderLogs();
  if(S.tab==='users')return renderUsers();
  return renderSites();
}

function renderSites(){
  let h=`<div class="section-header"><h1>Мои сайты</h1><div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:13px;color:#64748b">${S.sites.length} сайтов</span>
    <button class="btn btn-primary btn-sm" data-tab="add">+ Добавить</button></div></div>`;
  if(!S.sites.length)return h+`<div class="empty"><div class="icon">🌐</div><div class="text">Нет сайтов</div><button class="btn btn-primary" data-tab="add">Добавить</button></div>`;
  const admin=S.currentUser?.role==='admin';
  S.sites.forEach((s,i)=>{
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div style="flex:1;min-width:200px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span class="dot ${s.connected?'dot-green':'dot-red'}"></span>
          <span style="font-size:16px;font-weight:700;color:#f1f5f9">${esc(s.name)}</span>
          <span class="tag tag-cms">${esc(s.cms)}</span>
          ${s.connected&&s.connectionMethod?`<span class="tag tag-method">${esc(s.connectionMethod)}</span>`:''}
        </div>
        <div style="font-size:13px;color:#64748b">${esc(s.url)}</div>
        <div style="font-size:12px;color:#475569;margin-top:4px">Ссылок: <strong style="color:#94a3b8">${s.links.length}</strong>${s.lastCheck?` · ${fmtDate(s.lastCheck)}`:''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" data-do="connect" data-id="${s.id}">🔌 Связь</button>
        <button class="btn btn-ghost btn-sm" data-do="check" data-id="${s.id}" ${S.checkingId===s.id?'disabled':''}>${S.checkingId===s.id?'⏳':'🔍'} Проверить</button>
        <button class="btn btn-sm ${s.connected?'btn-primary':'btn-off'}" data-do="place" data-id="${s.id}">🔗 Разместить</button>
        ${admin?`<button class="btn btn-danger btn-sm" data-do="del" data-id="${s.id}">🗑</button>`:''}
      </div>
    </div>
    ${s.links.length?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(100,116,139,.1)">
      <div style="font-size:12px;color:#64748b;margin-bottom:6px">Размещённые:</div>
      ${s.links.map(l=>`<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px">
        <span>${l.placement==='sitewide'?'🌐':'🏠'}</span>
        <span style="color:#cbd5e1">${esc((l.preview||l.html||'').substring(0,80))}</span>
        <span style="color:#475569;font-size:11px">${fmtDate(l.placedAt)}</span>
      </div>`).join('')}</div>`:''}</div>`;
  });
  return h;
}

function renderAdd(){
  return`<div style="max-width:500px"><h1 style="margin-bottom:24px">Добавить сайт</h1>
    <div class="input-group"><label class="input-label">Название</label><input class="input" id="an" placeholder="Мой блог"></div>
    <div class="input-group"><label class="input-label">URL</label><input class="input" id="au" placeholder="https://example.com"></div>
    <div class="input-group"><label class="input-label">CMS</label><select class="input" id="ac">
      <option value="WordPress">WordPress</option><option value="Drupal" disabled>Drupal (скоро)</option>
      <option value="Joomla" disabled>Joomla (скоро)</option></select></div>
    <button class="btn btn-primary btn-lg" style="width:100%" id="addbtn">Добавить</button></div>`;
}

function renderLogs(){
  let h=`<h1 style="margin-bottom:24px">Логи</h1>`;
  if(!S.logs.length)return h+'<div class="empty">Пусто</div>';
  return h+[...S.logs].reverse().map(l=>`<div class="log-row">
    <span style="color:#475569;min-width:140px">${fmtDate(l.time)}</span>
    <span style="color:#94a3b8;min-width:50px">${esc(l.user)}</span>
    <span style="color:#e2e8f0;font-weight:500;min-width:120px">${esc(l.action)}</span>
    <span style="color:#64748b;word-break:break-all">${esc(l.detail||'')}</span></div>`).join('');
}

function renderUsers(){
  if(S.currentUser?.role!=='admin')return'<p>Нет доступа</p>';
  let h=`<h1 style="margin-bottom:24px">Пользователи</h1>`;
  S.users.forEach((u,i)=>{
    h+=`<div class="user-row"><div><strong style="color:#f1f5f9">${esc(u.name)}</strong> <span class="tag ${u.role==='admin'?'tag-admin':'tag-user'}">${u.role}</span></div>
    <div style="display:flex;gap:8px;align-items:center"><span style="color:#64748b;font-size:12px">${esc(u.id)}</span>
    ${u.id!=='admin'?`<button class="btn btn-danger btn-sm" data-do="deluser" data-idx="${i}">🗑</button>`:''}</div></div>`;
  });
  h+=`<div class="card" style="margin-top:20px"><h3 style="font-size:15px;color:#f1f5f9;margin-bottom:12px">Добавить</h3>
    <div class="add-user-form">
      <input class="input" id="nui" placeholder="ID"><input class="input" id="nun" placeholder="Имя">
      <input class="input" id="nup" placeholder="Пароль">
      <select class="input" id="nur" style="flex:0 0 auto;width:auto"><option value="user">User</option><option value="admin">Admin</option></select>
      <button class="btn btn-primary btn-sm" id="nub">+</button></div></div>`;
  return h;
}

function renderModal(){
  if(!S.modal)return'';
  const site=getSite(S.modal.siteId);
  if(!site)return'';

  if(S.modal.type==='connect'){
    const v=S.modal.view;
    let inner='';
    if(!v){
      inner=`<p style="color:#94a3b8;font-size:13px;margin-bottom:20px">Выберите способ. Можно несколько — любой обеспечит связь.</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="connect-option" data-cv="plugin"><span class="icon">🔌</span><div><div class="title">Плагин WP</div><div class="desc">Скачать и загрузить через админку</div></div></button>
          <button class="connect-option" data-cv="file"><span class="icon">📄</span><div><div class="title">Файл в корень</div><div class="desc">lp-connector.php рядом с wp-config.php</div></div></button>
          <button class="connect-option" data-cv="functions"><span class="icon">⚙️</span><div><div class="title">Код в functions.php</div><div class="desc">Вставить в конец functions.php темы</div></div></button>
        </div>`;
    }else if(v==='plugin'){
      inner=`<button class="btn btn-ghost btn-sm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">Плагин WordPress</h3>
        <ol class="steps"><li>Скачайте плагин</li><li><code>Плагины → Добавить → Загрузить</code></li><li>Активируйте</li><li>Проверьте связь</li></ol>
        <button class="btn btn-primary" style="margin-top:14px" id="dlp">📥 Скачать плагин</button>`;
    }else if(v==='file'){
      inner=`<button class="btn btn-ghost btn-sm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">Файл в корень</h3>
        <ol class="steps"><li>Скачайте файл</li><li>Загрузите в корень сайта (где wp-config.php)</li><li>Проверьте: <code>${esc(site.url)}/lp-connector.php?action=ping</code></li></ol>
        <button class="btn btn-primary" style="margin-top:14px" id="dlf">📥 Скачать файл</button>`;
    }else if(v==='functions'){
      inner=`<button class="btn btn-ghost btn-sm" data-cv="back">← Назад</button>
        <h3 style="color:#f1f5f9;margin:12px 0 8px">Код в functions.php</h3>
        <ol class="steps"><li>Скопируйте код</li><li><code>Внешний вид → Редактор тем → functions.php</code></li><li>Вставьте в конец, сохраните</li></ol>
        <div class="code-block"><pre>${esc(getFunctionsCode(site.secret))}</pre><button class="copy-btn" id="cpfn">Копировать</button></div>`;
    }
    return`<div class="modal-overlay" id="mo"><div class="modal modal-md">
      <div class="modal-header"><h2>Связь — ${esc(site.name)}</h2><button class="modal-close" id="mc">✕</button></div>
      ${inner}
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(100,116,139,.2)">
        <button class="btn btn-success" id="mcheck" ${S.checkingId?'disabled':''}>${S.checkingId?'⏳ Проверяю...':'🔍 Проверить связь'}</button>
      </div>
      <div class="secret-box"><strong>Secret:</strong> <code>${site.secret}</code></div>
    </div></div>`;
  }

  if(S.modal.type==='place'){
    if(!site.connected){
      return`<div class="modal-overlay" id="mo"><div class="modal modal-sm">
        <h3 style="color:#ef4444;margin-bottom:12px">⚠️ Нет связи</h3>
        <p style="color:#94a3b8;font-size:14px">Сначала установите связь с <strong style="color:#f1f5f9">${esc(site.name)}</strong></p>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary btn-sm" id="goconn">Установить связь</button>
          <button class="btn btn-ghost btn-sm" id="mc">Закрыть</button>
        </div></div></div>`;
    }
    return`<div class="modal-overlay" id="mo"><div class="modal modal-md">
      <div class="modal-header"><h2>Разместить — ${esc(site.name)}</h2><button class="modal-close" id="mc">✕</button></div>
      <div class="input-group"><label class="input-label">HTML-код</label>
        <textarea class="input" id="pl-html" rows="5" placeholder='<a href="https://example.com">Текст ссылки</a>' style="font-family:monospace;font-size:13px;resize:vertical;min-height:80px"></textarea>
        <div style="color:#64748b;font-size:11px;margin-top:4px">Любой HTML: ссылка, блок, баннер</div>
      </div>
      <div class="input-group"><label class="input-label">Размещение</label>
        <div style="display:flex;gap:8px">
          <button class="placement-btn active" data-pl="homepage">🏠 Главная</button>
          <button class="placement-btn" data-pl="sitewide">🌐 Сквозное</button>
        </div></div>
      <button class="btn btn-primary btn-lg" style="width:100%;margin-top:8px" id="dopl">Разместить</button>
    </div></div>`;
  }
  return'';
}

// === BINDINGS ===
function bind(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;render()});
  const lo=document.getElementById('logout');if(lo)lo.onclick=()=>{S.loggedIn=false;S.currentUser=null;render()};

  // Add site
  const ab=document.getElementById('addbtn');
  if(ab)ab.onclick=()=>{
    const n=document.getElementById('an').value.trim();let u=document.getElementById('au').value.trim();
    if(!n||!u)return notify('Заполните поля','error');
    if(!u.startsWith('http'))u='https://'+u;u=u.replace(/\/+$/,'');
    if(S.sites.some(s=>s.url===u))return notify('Уже есть','error');
    S.sites.push({id:Date.now().toString(),url:u,name:n,cms:document.getElementById('ac').value,secret:genSecret(),connected:false,connectionMethod:null,links:[],addedAt:new Date().toISOString(),lastCheck:null});
    addLog('Добавлен',u);S.tab='sites';notify('Добавлен');render();
  };

  // Site actions
  document.querySelectorAll('[data-do]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.id, idx=parseInt(el.dataset.idx), act=el.dataset.do;
    if(act==='connect'){S.modal={type:'connect',siteId:id,view:null};render()}
    if(act==='check')doCheck(id);
    if(act==='place'){S.modal={type:'place',siteId:id};render()}
    if(act==='del'){S.sites=S.sites.filter(s=>s.id!==id);save();notify('Удалён');render()}
    if(act==='deluser'){S.users.splice(idx,1);save();notify('Удалён');render()}
  });

  // Modal
  const mc=document.getElementById('mc');if(mc)mc.onclick=()=>{S.modal=null;render()};
  const mo=document.getElementById('mo');if(mo)mo.onclick=e=>{if(e.target===mo){S.modal=null;render()}};

  // Connect views
  document.querySelectorAll('[data-cv]').forEach(el=>el.onclick=()=>{
    if(!S.modal)return;S.modal.view=el.dataset.cv==='back'?null:el.dataset.cv;render();
  });

  // Downloads
  const dlp=document.getElementById('dlp');if(dlp&&S.modal)dlp.onclick=()=>downloadFile(getPluginCode(getSite(S.modal.siteId).secret),'link-placer-connector.php');
  const dlf=document.getElementById('dlf');if(dlf&&S.modal)dlf.onclick=()=>downloadFile(getFileCode(getSite(S.modal.siteId).secret),'lp-connector.php');
  const cpfn=document.getElementById('cpfn');if(cpfn&&S.modal)cpfn.onclick=()=>copyText(getFunctionsCode(getSite(S.modal.siteId).secret));

  // Check from modal
  const mch=document.getElementById('mcheck');if(mch&&S.modal)mch.onclick=()=>doCheck(S.modal.siteId);

  // Go connect from place
  const gc=document.getElementById('goconn');if(gc&&S.modal)gc.onclick=()=>{S.modal={type:'connect',siteId:S.modal.siteId,view:null};render()};

  // Placement
  document.querySelectorAll('[data-pl]').forEach(el=>el.onclick=()=>{
    document.querySelectorAll('.placement-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  });

  // Do place
  const dp=document.getElementById('dopl');if(dp&&S.modal)dp.onclick=()=>doPlace(S.modal.siteId);

  // Add user
  const nub=document.getElementById('nub');
  if(nub)nub.onclick=()=>{
    const id=document.getElementById('nui').value.trim(),n=document.getElementById('nun').value.trim(),p=document.getElementById('nup').value,r=document.getElementById('nur').value;
    if(!id||!n||!p)return notify('Заполните','error');
    if(S.users.some(u=>u.id===id))return notify('ID занят','error');
    S.users.push({id,name:n,pass:p,role:r});save();notify('Добавлен');render();
  };
}

// === INIT ===
load();
render();
</script>
</body>
</html>
